<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Playground</title>
    <div class="project-info">
    Write, execute, analyze and debug HTML, CSS and JavaScript code using Machine Learning and Generative AI.
</div>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>AI-Powered Online Code Playground</h1>

    <div class="editor-container">

        <div class="editor">
            <h3>HTML</h3>
            <div id="htmlEditor" class="editor-box"></div>
        </div>

        <div class="editor">
            <h3>CSS</h3>
            <div id="cssEditor" class="editor-box"></div>
        </div>

        <div class="editor">
            <h3>JavaScript</h3>
            <div id="jsEditor" class="editor-box"></div>
        </div>

    </div>

    <div class="buttons">
        <button onclick="runCode()">Run Code</button>
        <button onclick="clearCode()">Clear</button>
        <button onclick="checkErrors()">Check Errors</button>
        <button onclick="debugWithAI()">Debug with AI</button>
        <button onclick="explainCode()">Explain Code</button>
    </div>

    <h2>Output</h2>

    <h3 id="predictionResult"></h3>

    <div id="aiSuggestion"></div>

    <div id="codeExplanation"></div>

    <iframe id="output"></iframe>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
    <script src="script.js"></script>
    <footer>
    AI-Powered Online Code Playground | Built using Flask, Naive Bayes & Gemini AI
</footer>
</body>

</html>
